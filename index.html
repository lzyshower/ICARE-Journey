<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bingjie's ICARE Journey</title>
<link rel="icon" href="favicon.ico">
<link rel="preload" href="assets/bg.webp" as="image" fetchpriority="high">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Arial', sans-serif;
}
html,body {
  width: 100%;
  min-height: 100%;
  overflow: hidden;
}
.container {
  width: 100%;
  min-height: 100vh;
  min-height: 100svh;
  position: relative;
}
.bg {
  width: 100%;
  min-height: 100vh;
  min-height: 100svh;
  background: url("assets/bg.webp") no-repeat center;
  background-size: cover;
  position: absolute;
  top: 0;
  left: 0;
}
/* 按键样式 */
.btn {
  width: 100px;
  height: 100px;
  background-size: contain;
  background-repeat: no-repeat;
  background-position: center;
  background-color: transparent;
  border: 0;
  border-radius: 0;
  color: transparent;
  font-size: 0;
  line-height: 0;
  position: absolute;
  cursor: pointer;
  appearance: none;
  padding: 0;
}
/* 按键精准定位 */
.btn1 { left: 0%; bottom: 12%; background-image: url("assets/btn1.webp"); }
.btn2 { left: 33%; bottom: 0%; background-image: url("assets/btn2.webp"); }
.btn3 { left: 48%; bottom: 16%; background-image: url("assets/btn3.webp"); }
.btn4 { right: 15%; top: 48%; background-image: url("assets/btn4.webp"); }
.btn5 { right: 0%; top: 20%; background-image: url("assets/btn5.webp"); }

/* 进度条 */
.progress {
  position: absolute;
  top: 25px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(255,255,255,0.9);
  padding: 8px 20px;
  border-radius: 20px;
  font-size: 16px;
  z-index: 999;
  display: flex;
  align-items: center;
  gap: 8px;
}
.progress img {
  width: 20px;
  height: 20px;
}

/* 弹窗通用 */
.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: rgba(0,0,0,0.6);
  justify-content: center;
  align-items: center;
  z-index: 999;
}
.modal-box {
  width: 80%;
  background: #fff;
  border-radius: 16px;
  padding: 30px 20px;
  text-align: center;
  position: relative;
}
.modal-top-img {
  width: 80px;
  height: 80px;
  object-fit: contain;
  margin: 0 auto 20px;
}
.m-title {
  font-size: 18px;
  font-weight: bold;
  margin-bottom: 20px;
  line-height: 1.4;
}
/* 选项左对齐 */
.opt {
  background: #f5f5f5;
  padding: 15px;
  border-radius: 8px;
  margin: 12px 0;
  font-size: 16px;
  display: flex;
  align-items: flex-start;
  gap: 10px;
  cursor: pointer;
  text-align: left;
  border: 0;
  width: 100%;
  font-family: inherit;
}
.opt img {
  width: 24px;
  height: 24px;
  margin-top: 2px;
}
.close-btn {
  margin-top: 20px;
  color: #666;
  font-size: 16px;
  cursor: pointer;
  background: transparent;
  border: 0;
  font-family: inherit;
}
.txt {
  line-height: 1.5;
  margin:10px 0;
}
</style>
</head>
<body>

<div class="container">
  <div class="bg"></div>
  <button class="btn btn1" type="button" onclick="openQ(1)" aria-label="Open question 1">Question 1</button>
  <button class="btn btn2" type="button" onclick="openQ(2)" aria-label="Open question 2">Question 2</button>
  <button class="btn btn3" type="button" onclick="openQ(3)" aria-label="Open question 3">Question 3</button>
  <button class="btn btn4" type="button" onclick="openQ(4)" aria-label="Open question 4">Question 4</button>
  <button class="btn btn5" type="button" onclick="openQ(5)" aria-label="Open question 5">Question 5</button>
  <div class="progress">
    <img src="assets/coin.webp" width="20" height="20" alt="coin" decoding="async">
    <span>ICARE Journey Progress: <span id="gotNum">0</span>/5</span>
  </div>
</div>

<!-- 选择题弹窗 -->
<div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <div class="modal-box">
    <img class="modal-top-img" data-src="assets/question.webp" width="80" height="80" alt="question girl" decoding="async">
    <div class="m-title" id="modalTitle"></div>
    <button class="opt" type="button" onclick="chooseA()">
      <img data-src="assets/mushroom.webp" width="24" height="24" alt="mushroom" decoding="async">
      <span id="optionA"></span>
    </button>
    <button class="opt" type="button" onclick="chooseB()">
      <img data-src="assets/mushroom.webp" width="24" height="24" alt="mushroom" decoding="async">
      <span id="optionB"></span>
    </button>
    <button class="close-btn" type="button" onclick="closeModal()">Try Again</button>
  </div>
</div>

<!-- 获得道具弹窗（已去掉顶部插图） -->
<div class="modal" id="rewardModal" role="dialog" aria-modal="true" aria-labelledby="rewardTitle">
  <div class="modal-box">
    <div class="m-title" id="rewardTitle"></div>
    <div class="txt" id="rewardDesc"></div>
    <button class="close-btn" type="button" onclick="closeReward()">Continue Adventure</button>
  </div>
</div>

<!-- 通关弹窗 -->
<div class="modal" id="winModal" role="dialog" aria-modal="true" aria-labelledby="winTitle">
  <div class="modal-box">
    <img class="modal-top-img" data-src="assets/win_girl.webp" width="80" height="80" alt="win girl" decoding="async">
    <div class="m-title" id="winTitle">🏆 Congratulations on Clearing the Game</div>
    <div class="txt">You have successfully completed the project and the ICARE Journey!</div>
    <button class="close-btn" type="button" onclick="resetGame()">Play Again</button>
  </div>
</div>

<script>
let currentId = 0;
let items = {1:false,2:false,3:false,4:false,5:false};
let gotNum = 0;
let pendingWin = false;

const questions = {
  1: {
    title: "Facing rapid market changes and conservative calculation models, what is your choice?",
    a: "Clarify all pain points and try to solve problems with new methods",
    b: "Stick to the original method to avoid mistakes",
    rewardTitle: "🎉 Congratulations! You obtained ICARE Fragment: Authentic",
    rewardDesc: "Think calmly before decision-making, act decisively afterwards"
  },
  2: {
    title: "There are many questions about the market and debates over study objectives. What will you do?",
    a: "Listen and record actively, hold workshops with key stakeholders, and summarize key questions",
    b: "Follow Sylvain’s advice directly",
    rewardTitle: "🎉 Congratulations! You obtained ICARE Fragment: Creating Trust",
    rewardDesc: "Build trust amid uncertainty"
  },
  3: {
    title: "During project execution, you find the agency’s questionnaire only covers key questions. How will you respond?",
    a: "Connect the current study with previous market insights to ensure consistency and cross-checkable results",
    b: "Only answer key questions as decided in earlier meetings",
    rewardTitle: "🎉 Congratulations! You obtained ICARE Fragment: Result-Oriented",
    rewardDesc: "Always think one step further"
  },
  4: {
    title: "All research results are ready and need to be shared. What is your choice?",
    a: "Dig deeper into data to build models and cross-check public sources for representative results",
    b: "Send the report directly and share insights in the meeting",
    rewardTitle: "🎉 Congratulations! You obtained ICARE Fragment: Inspiring",
    rewardDesc: "Create value with innovative thinking"
  },
  5: {
    title: "You find OE-RT and Mileage topics affect not only B2C marketing decisions but also strategies of OE, DORD and other departments. What will you do?",
    a: "Take initiative in cross-department collaboration to align market understanding and strategic direction",
    b: "Only provide insights and leave strategic decisions to business teams",
    rewardTitle: "🎉 Congratulations! You obtained ICARE Fragment: Empowerment",
    rewardDesc: "Keep the courage to move one step forward"
  }
};

function openQ(id){
  currentId = id;
  const q = questions[id];
  document.getElementById("modalTitle").innerText = q.title;
  document.getElementById("optionA").innerText = q.a;
  document.getElementById("optionB").innerText = q.b;
  showModal("modal");
}

function loadLazyImages(container){
  container.querySelectorAll("img[data-src]").forEach((img) => {
    if(!img.src) img.src = img.dataset.src;
  });
}

function showModal(id){
  const modal = document.getElementById(id);
  loadLazyImages(modal);
  modal.style.display = "flex";
}

function chooseA(){
  document.getElementById("modal").style.display = "none";
  if(items[currentId]) return;

  items[currentId] = true;
  gotNum++;
  document.getElementById("gotNum").innerText = gotNum;
  
  const q = questions[currentId];
  document.getElementById("rewardTitle").innerText = q.rewardTitle;
  document.getElementById("rewardDesc").innerText = q.rewardDesc;
  showModal("rewardModal");

  if(gotNum >= 5){
    pendingWin = true;
  }
}

function chooseB(){
  document.getElementById("modal").style.display = "none";
}
function closeModal(){
  document.getElementById("modal").style.display = "none";
}
function closeReward(){
  document.getElementById("rewardModal").style.display = "none";
  if(pendingWin){
    pendingWin = false;
    showModal("winModal");
  }
}
function resetGame(){
  items = {1:false,2:false,3:false,4:false,5:false};
  gotNum = 0;
  pendingWin = false;
  document.getElementById("gotNum").innerText = 0;
  document.getElementById("winModal").style.display = "none";
}
</script>

</body>
</html>
